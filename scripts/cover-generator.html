<!DOCTYPE html>
<html>
<head>
    <title>Cover Generator - gen.pollinations.ai</title>
    <style>
        body { font-family: Arial; max-width: 800px; margin: 50px auto; padding: 20px; }
        .story { border: 1px solid #ddd; padding: 15px; margin: 10px 0; border-radius: 8px; }
        button { background: #7c3aed; color: white; padding: 10px 20px; border: none; cursor: pointer; border-radius: 4px; }
        button:disabled { background: #ccc; }
        img { max-width: 300px; margin-top: 10px; }
        .status { color: #666; font-size: 14px; }
    </style>
</head>
<body>
    <h1>🎨 AI Cover Generator (gen.pollinations.ai - Flux)</h1>

    <!-- [HIDDEN] Hugging Face section — dinonaktifkan, pakai pollinations sekarang
    <div style="background: #f0f0f0; padding: 15px; border-radius: 8px; margin-bottom: 20px;">
        <label><strong>Hugging Face Token:</strong></label>
        <input type="text" id="hfToken" placeholder="hf_..." value="">
        <p style="font-size: 12px; color: #666;">Get token from: https://huggingface.co/settings/tokens</p>
    </div>
    -->

    <div id="stories"></div>

    <script>
        const stories = [
            {
                id: "6480d4ea-5c9c-4438-bd48-fa1a619b0e5a",
                title: "SURAT UNTUK PAK POS",
                category: "Inspirational",
                prompt: "Book cover design for \"SURAT UNTUK PAK POS\", Inspirational genre. dramatic and engaging. atmospheric background. Professional book cover art, high quality, detailed illustration, cinematic lighting."
            },
            {
                id: "0d0703b8-f384-4a96-b40b-2282838a0787",
                title: "PAYUNG PINJAMAN",
                category: "Inspirational",
                prompt: "Book cover design for \"PAYUNG PINJAMAN\", Inspirational genre. dramatic and engaging. atmospheric background. Professional book cover art, high quality, detailed illustration, cinematic lighting."
            },
            {
                id: "429a88de-b886-4a00-9e08-b5333527f1bd",
                title: "BEKAL TIGA LAPIS",
                category: "Inspirational",
                prompt: "Book cover design for \"BEKAL TIGA LAPIS\", Inspirational genre. dramatic and engaging. atmospheric background. Professional book cover art, high quality, detailed illustration, cinematic lighting."
            },
            {
                id: "cfdda7ca-bd4d-4178-8077-9eba470cbba5",
                title: "STASIUN TANPA KERETA",
                category: "Inspirational",
                prompt: "Book cover design for \"STASIUN TANPA KERETA\", Inspirational genre. dramatic and engaging. atmospheric background. Professional book cover art, high quality, detailed illustration, cinematic lighting."
            },
            {
                id: "7f40f9c2-7b94-44b7-8a12-75a22316fb90",
                title: "TUKANG TAMBAL BAN PUKUL TIGA PAGI",
                category: "Inspirational",
                prompt: "Book cover design for \"TUKANG TAMBAL BAN PUKUL TIGA PAGI\", Inspirational genre. dramatic and engaging. atmospheric background. Professional book cover art, high quality, detailed illustration, cinematic lighting."
            }
        ];

        const container = document.getElementById('stories');

        stories.forEach((story, index) => {
            const div = document.createElement('div');
            div.className = 'story';
            div.innerHTML = `
                <h3>${index + 1}. ${story.title}</h3>
                <p><strong>Genre:</strong> ${story.category}</p>
                <p><strong>Prompt:</strong> ${story.prompt}</p>
                <button onclick="generate('${story.id}', ${index})">Generate Cover</button>
                <div class="status" id="status-${index}"></div>
                <img id="img-${index}" style="display:none;">
                <div id="download-${index}" style="margin-top:10px;"></div>
            `;
            container.appendChild(div);
        });

        async function generate(storyId, index) {
            const story = stories[index];
            const statusEl = document.getElementById(`status-${index}`);
            const imgEl = document.getElementById(`img-${index}`);
            const downloadEl = document.getElementById(`download-${index}`);

            statusEl.textContent = 'Generating via gen.pollinations.ai... (10-30 detik)';

            // [HIDDEN] Hugging Face generate call — dinonaktifkan
            // const response = await fetch(
            //     "https://api-inference.huggingface.co/models/black-forest-labs/FLUX.1-schnell",
            //     {
            //         headers: {
            //             Authorization: `Bearer ${token}`,
            //             "Content-Type": "application/json",
            //         },
            //         method: "POST",
            //         body: JSON.stringify({
            //             inputs: story.prompt,
            //             parameters: { width: 800, height: 1200 }
            //         }),
            //     }
            // );
            // [/HIDDEN]

            try {
                const seed = Math.floor(Math.random() * 999999);
                const encodedPrompt = encodeURIComponent(story.prompt);
                const url = `https://gen.pollinations.ai/image/${encodedPrompt}?model=flux&width=600&height=900&seed=${seed}&nologo=true`;

                const response = await fetch(url, {
                    headers: { 'Authorization': 'Bearer sk_CXBacRDWFN75aHuME09vqzSJF6aCw1hh' }
                });

                if (!response.ok) {
                    const text = await response.text();
                    throw new Error(`API Error: ${response.status} - ${text}`);
                }

                const blob = await response.blob();
                const objectUrl = URL.createObjectURL(blob);

                imgEl.src = objectUrl;
                imgEl.style.display = 'block';

                statusEl.textContent = `✓ Generated! (${(blob.size / 1024).toFixed(2)} KB)`;
                statusEl.style.color = 'green';

                downloadEl.innerHTML = `
                    <a href="${objectUrl}" download="${storyId}.png"
                       style="background:#7c3aed;color:white;padding:10px 20px;text-decoration:none;border-radius:4px;display:inline-block;">
                        Download ${storyId}.png
                    </a>
                `;
            } catch (error) {
                statusEl.textContent = `✗ Error: ${error.message}`;
                statusEl.style.color = 'red';
            }
        }
    </script>
</body>
</html>
